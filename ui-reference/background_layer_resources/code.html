<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Background Layers Assets</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto border-x border-slate-200 dark:border-slate-800">
<!-- Header Section -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between sticky top-0 z-10 border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Background Layers</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-slate-900 dark:text-slate-100 gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</div>
</div>
<!-- Title and Tabs -->
<div class="bg-white dark:bg-slate-900 px-4 pt-5">
<h1 class="text-slate-900 dark:text-slate-100 text-[22px] font-bold leading-tight tracking-[-0.015em] pb-3">App Canvas Styles</h1>
<div class="flex border-b border-slate-200 dark:border-slate-700 gap-8">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-primary pb-[13px] pt-4" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Gradients</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-[13px] pt-4 hover:text-primary transition-colors" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Mesh</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-[13px] pt-4 hover:text-primary transition-colors" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Glassmorphic</p>
</a>
</div>
</div>
<!-- Asset Grid -->
<div class="grid grid-cols-1 gap-4 p-4 mb-20">
<!-- Main Gradient BG Card -->
<div class="relative group cursor-pointer overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm transition-all hover:shadow-md">
<div class="aspect-video w-full bg-gradient-to-br from-[#e0f2fe] via-[#f8fafc] to-white dark:from-[#0c4a6e] dark:via-[#111921] dark:to-[#111921]" data-alt="Soft blue to white linear gradient background">
<!-- Decorative element for gradient visual -->
<div class="absolute inset-0 opacity-50 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-primary/10 via-transparent to-transparent"></div>
</div>
<div class="p-4 flex justify-between items-center">
<div>
<h3 class="text-slate-900 dark:text-slate-100 font-bold text-base">Main Gradient BG</h3>
<p class="text-slate-500 dark:text-slate-400 text-xs">Standard app canvas</p>
</div>
<div class="size-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
</div>
</div>
</div>
<!-- Soft Mesh BG Card -->
<div class="relative group cursor-pointer overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm transition-all hover:shadow-md">
<div class="aspect-video w-full bg-[#f8fafc] dark:bg-[#111921] overflow-hidden relative" data-alt="Subtle mesh pattern with soft blue accents">
<!-- Mesh Pattern Simulation -->
<div class="absolute top-[-20%] left-[-10%] size-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-5%] size-48 bg-blue-200/20 dark:bg-blue-900/20 rounded-full blur-3xl"></div>
<div class="absolute top-[20%] right-[10%] size-32 bg-sky-100/30 dark:bg-sky-900/10 rounded-full blur-2xl"></div>
<div class="absolute inset-0 opacity-[0.03] dark:opacity-[0.05]" style="background-image: radial-gradient(#197fe6 0.5px, transparent 0.5px); background-size: 16px 16px;"></div>
</div>
<div class="p-4 flex justify-between items-center">
<div>
<h3 class="text-slate-900 dark:text-slate-100 font-bold text-base">Soft Mesh BG</h3>
<p class="text-slate-500 dark:text-slate-400 text-xs">Dynamic textured surface</p>
</div>
<div class="size-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[20px]">add</span>
</div>
</div>
</div>
<!-- Depth Overlay Card -->
<div class="relative group cursor-pointer overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm transition-all hover:shadow-md">
<div class="aspect-video w-full bg-slate-50 dark:bg-background-dark relative overflow-hidden" data-alt="Glassmorphic blobs creating depth on background">
<!-- Blurred Glass Blobs -->
<div class="absolute top-1/4 left-1/4 size-32 bg-primary/30 rounded-full blur-[60px]"></div>
<div class="absolute bottom-1/3 right-1/4 size-40 bg-blue-400/20 rounded-full blur-[80px]"></div>
<div class="absolute inset-0 backdrop-blur-[1px]"></div>
</div>
<div class="p-4 flex justify-between items-center">
<div>
<h3 class="text-slate-900 dark:text-slate-100 font-bold text-base">Depth Overlay</h3>
<p class="text-slate-500 dark:text-slate-400 text-xs">Layered glass effect</p>
</div>
<div class="size-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[20px]">add</span>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md px-4 pb-3 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">inventory_2</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Assets</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">layers</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Layers</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">palette</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Themes</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">settings</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Settings</p>
</a>
</div>
</div>
</body></html>
